<!DOCTYPE html>
<html>
<head>
<title>TidyBite</title>
<style>
body { font-family: Arial; margin:0; }
nav {
  background: green;
  color: white;
  padding: 15px;
  display:flex;
  justify-content: space-between;
}
.hero {
  text-align:center;
  padding:100px;
}
button {
  padding:10px 20px;
  background:green;
  color:white;
  border:none;
  border-radius:20px;
}
</style>
</head>

<body>

<nav>
  <h2>TidyBite</h2>
  <button onclick="logout()">Logout</button>
</nav>

<div class="hero">
  <h1>Clean Street Food 🌱</h1>
  <p>Eco-friendly edible cups</p>

  <button onclick="goToContact()">Order Now</button>
</div>

<div id="contact" style="padding:50px;">
  <h2>Contact</h2>
  <p>Phone: +91 9381889534</p>

  <a href="https://wa.me/919381889534" target="_blank">
    <button>Order on WhatsApp</button>
  </a>
</div>

<script>
// protect page
if(localStorage.getItem("loggedIn") !== "true") {
  window.location.href = "login.html";
}

function logout() {
  localStorage.removeItem("loggedIn");
  window.location.href = "login.html";
}

function goToContact() {
  document.getElementById("contact").scrollIntoView({behavior:"smooth"});
}
</script>

</body>
</html>
